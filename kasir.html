<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier Apex - POS Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .serif {
            font-family: 'Playfair Display', serif;
        }

        /* Sidebar styling */
        .sidebar-link.active {
            background: #0f172a;
            color: white;
        }

        /* REVISI 1: Menghapus efek hover pada sidebar-link */
        .sidebar-link {
            transition: all 0.2s;
        }

        .sidebar-link:hover {
            cursor: pointer;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes pulse-red {
            0% {
                transform: scale(1);
            }

            70% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }

        .badge-anim {
            animation: pulse-red 2s infinite;
        }
    </style>
</head>

<body class="bg-slate-50 flex h-screen overflow-hidden">

    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"
        preload="auto"></audio>

    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col">
        <div class="p-6 border-b border-slate-100">
            <h2 class="serif text-2xl font-bold text-slate-900">Atelier <span class="text-blue-600">Apex</span></h2>
            <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase mt-1">Cashier System v1.0</p>
        </div>

        <nav class="flex-1 p-4 space-y-2">
            <button onclick="switchTab('dashboard')" id="btn-dashboard"
                class="sidebar-link active w-full flex items-center gap-3 p-3 rounded-xl text-sm font-medium">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard Meja
            </button>

            <button onclick="switchTab('orders')" id="btn-orders"
                class="sidebar-link text-slate-500 w-full flex items-center justify-between p-3 rounded-xl text-sm font-medium">
                <div class="flex items-center gap-3">
                    <i data-lucide="utensils" class="w-5 h-5"></i> Pesanan Masuk
                </div>
                <span id="orderBadge"
                    class="hidden bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full font-bold badge-anim">0</span>
            </button>

            <button onclick="switchTab('history')" id="btn-history"
                class="sidebar-link text-slate-500 w-full flex items-center gap-3 p-3 rounded-xl text-sm font-medium">
                <i data-lucide="history" class="w-5 h-5"></i> Riwayat Transaksi
            </button>
        </nav>

        <div class="p-4 border-t border-slate-100">
            <div class="bg-slate-900 rounded-2xl p-4 text-white text-center">
                <p class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-1">Kasir</p>
                <p class="text-sm">Admin Atelier</p>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="bg-white border-b border-slate-200 p-6 flex justify-between items-center">
            <div>
                <h1 id="page-title" class="text-xl font-bold text-slate-900">Monitoring Meja</h1>
                <p class="text-xs text-slate-500 mt-1" id="liveClock">Memuat waktu...</p>
            </div>
            <button onclick="resetSemuaMeja()"
                class="text-xs font-bold text-red-500 border border-red-100 px-4 py-2 rounded-xl hover:bg-red-50 transition-all">
                RESET SEMUA MEJA
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            <div id="tab-dashboard" class="tab-content active">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-6">Denah Meja Aktif</h3>
                <div id="adminGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
            </div>

            <div id="tab-orders" class="tab-content">
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-6 text-blue-600">Daftar Pesanan
                    Terbaru</h3>
                <div id="orderList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

        </div>

        <div id="tab-history" class="tab-content">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-4">
                    <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Riwayat Transaksi Hari Ini
                    </h3>
                    <button onclick="toggleVoidDisplay()" id="btnToggleVoid"
                        class="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-slate-200 text-[10px] font-bold uppercase tracking-tighter transition-all hover:bg-slate-50">
                        <i data-lucide="eye-off" class="w-3 h-3"></i> Tampilkan Void
                    </button>
                </div>
                <div class="bg-blue-50 px-4 py-2 rounded-xl border border-blue-100">
                    <span class="text-[10px] font-bold text-blue-400 uppercase block">Total Omzet</span>
                    <span id="totalOmzet" class="text-lg font-black text-blue-600">Rp0</span>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] border border-slate-200 overflow-hidden shadow-sm">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 border-b border-slate-100">
                    <tr>
                        <th class="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Waktu</th>
                        <th class="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Meja</th>
                        <th class="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest">Pelanggan</th>
                        <th class="p-4 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Total
                        </th>
                    </tr>
                </thead>
                <tbody id="historyList">
                </tbody>
            </table>
            <div id="historyEmpty" class="hidden p-20 text-center text-slate-400 italic text-sm">
                Belum ada transaksi selesai hari ini.
            </div>
        </div>
        </div>

        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCQuohmYq7Q_eR7OpfjrVgdRitOgqcX2GY",
            authDomain: "cafe-order-system-f7024.firebaseapp.com",
            projectId: "cafe-order-system-f7024",
            storageBucket: "cafe-order-system-f7024.firebasestorage.app",
            messagingSenderId: "903604964032",
            appId: "1:903604964032:web:ab5c8efd4acf36b4943b25",
            databaseURL: "https://cafe-order-system-f7024-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let lastOrderCount = 0;
        let currentActiveTab = 'dashboard';
        let showVoidItems = false; // Status awal: Sembunyikan pembatalan

        const tabTitles = {
            dashboard: 'Monitoring Meja',
            orders: 'Pesanan Masuk',
            history: 'Riwayat Transaksi'
        };

        // Fungsi Toggle untuk tombol tampilkan/sembunyikan void
        function toggleVoidDisplay() {
            showVoidItems = !showVoidItems;
            const btn = document.getElementById('btnToggleVoid');

            if (showVoidItems) {
                btn.innerHTML = `<i data-lucide="eye" class="w-3 h-3"></i> Sembunyikan Void`;
                btn.classList.add('bg-red-50', 'text-red-500', 'border-red-200');
            } else {
                btn.innerHTML = `<i data-lucide="eye-off" class="w-3 h-3"></i> Tampilkan Void`;
                btn.classList.remove('bg-red-50', 'text-red-500', 'border-red-200');
            }

            // Refresh tampilan riwayat
            const today = new Date().toLocaleDateString('en-CA');
            db.ref('history/' + today).once('value', (snapshot) => {
                renderHistory(snapshot.val());
            });
        }

        function switchTab(tabName) {
            currentActiveTab = tabName;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));

            document.getElementById('tab-' + tabName).classList.add('active');
            document.getElementById('btn-' + tabName).classList.add('active');
            document.getElementById('page-title').textContent = tabTitles[tabName] || 'Dashboard';

            if (tabName === 'orders') {
                document.getElementById('orderBadge').classList.add('hidden');
            }
        }

        function watchFirebase() {
            db.ref('tables').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                let currentOrderCount = 0;
                for (let i in data) {
                    if (data[i].status === 'occupied' && data[i].orderDetail) currentOrderCount++;
                }
                if (currentOrderCount > lastOrderCount && currentActiveTab !== 'orders') playNotif();
                lastOrderCount = currentOrderCount;
                updateBadge(currentOrderCount);
                renderMeja(data);
                renderOrders(data);
            });

            const today = new Date().toLocaleDateString('en-CA');
            db.ref('history/' + today).on('value', (snapshot) => {
                renderHistory(snapshot.val());
            });
        }

        function playNotif() {
            const sound = document.getElementById('notifSound');
            sound.play().catch(e => console.log("Audio play blocked"));
        }

        function updateBadge(count) {
            const badge = document.getElementById('orderBadge');
            if (count > 0 && currentActiveTab !== 'orders') {
                badge.textContent = count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function renderMeja(data) {
            const grid = document.getElementById('adminGrid');
            let html = '';
            for (let i = 1; i <= 15; i++) {
                const status = data[i] ? data[i].status : 'available';
                const isOccupied = status === 'occupied';
                html += `
            <div class="bg-white p-6 rounded-[2rem] border-2 transition-all shadow-sm ${isOccupied ? 'border-red-500 bg-red-50/20' : 'border-slate-100'}">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-xl font-black text-slate-800">#${String(i).padStart(2, '0')}</span>
                    <div class="h-3 w-3 rounded-full ${isOccupied ? 'bg-red-500 animate-pulse' : 'bg-slate-200'}"></div>
                </div>
                ${isOccupied ?
                        `<button onclick="kosongkanMeja(${i})" class="w-full bg-red-600 text-white py-3 rounded-2xl text-[10px] font-bold hover:bg-red-700 uppercase tracking-widest transition-all">Kosongkan Meja</button>` :
                        `<div class="text-[10px] text-center font-bold text-slate-400 py-3 border border-dashed border-slate-200 rounded-2xl uppercase tracking-widest">Tersedia</div>`
                    }
            </div>`;
            }
            grid.innerHTML = html;
            lucide.createIcons();
        }

        function renderOrders(data) {
            const list = document.getElementById('orderList');
            let html = '';
            let hasOrders = false;
            for (let i in data) {
                if (data[i].status === 'occupied' && data[i].orderDetail) {
                    hasOrders = true;
                    const order = data[i].orderDetail;
                    html += `
                <div class="bg-white border border-slate-200 rounded-[2.5rem] p-6 shadow-sm flex flex-col justify-between h-full border-l-4 border-l-blue-500">
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <span class="bg-blue-600 text-white text-[10px] px-3 py-1 rounded-full font-bold uppercase tracking-wider">Meja ${i}</span>
                            <span class="text-[10px] text-slate-400 font-medium">${order.time}</span>
                        </div>
                        <div class="mb-4">
                            <h4 class="text-sm font-black text-slate-800 uppercase tracking-tight">${order.customerName || 'Pelanggan'}</h4>
                            <div class="h-1 w-8 bg-blue-100 rounded-full mt-1"></div>
                        </div>
                        <div class="space-y-2 mb-6">
                            ${order.items.map(item => `
                                <div class="flex justify-between text-sm">
                                    <span class="text-slate-600">${item.qty}x ${item.name}</span>
                                    <span class="font-bold text-slate-900">Rp${(item.price * item.qty).toLocaleString()}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="pt-4 border-t border-slate-100">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-xs font-bold text-slate-400 uppercase">Total Tagihan</span>
                            <span class="text-lg font-black text-blue-600">Rp${order.total.toLocaleString()}</span>
                        </div>
                        <button onclick="selesaikanPesanan(${i})" class="w-full bg-slate-900 text-white py-3 rounded-2xl text-xs font-bold hover:bg-green-600 transition-all flex items-center justify-center gap-2">
                            <i data-lucide="check-circle-2" class="w-4 h-4"></i> SELESAIKAN PESANAN
                        </button>
                    </div>
                </div>`;
                }
            }
            list.innerHTML = hasOrders ? html : '<div class="col-span-full text-center py-20 text-slate-400 italic">Belum ada pesanan masuk.</div>';
            lucide.createIcons();
        }

        function renderHistory(data) {
            const list = document.getElementById('historyList');
            const emptyMsg = document.getElementById('historyEmpty');
            const totalDisplay = document.getElementById('totalOmzet');

            if (!data) {
                list.innerHTML = '';
                emptyMsg.classList.remove('hidden');
                totalDisplay.textContent = "Rp0";
                return;
            }

            emptyMsg.classList.add('hidden');
            let html = '';
            let grandTotal = 0;

            // Gunakan Object.entries agar kita punya ID (key) untuk fungsi void
            const entries = Object.entries(data).reverse();

            entries.forEach(([key, item]) => {
                const isVoid = item.status === 'void';

                // Filter: Jangan tampilkan jika status void dan tombol toggle sedang OFF
                if (isVoid && !showVoidItems) return;

                // Hanya hitung omzet jika transaksi SUKSES
                if (!isVoid) grandTotal += item.total;

                html += `
            <tr class="border-b border-slate-50 ${isVoid ? 'bg-red-50/40' : 'hover:bg-slate-50/50'} transition-colors">
                <td class="p-4 text-xs font-medium text-slate-500">${item.completedAt || item.time}</td>
                <td class="p-4"><span class="bg-slate-100 text-slate-700 px-2 py-1 rounded-md text-[10px] font-bold">MEJA ${item.meja}</span></td>
                <td class="p-4 text-sm font-bold ${isVoid ? 'text-slate-400 line-through' : 'text-slate-800'}">${item.customerName || 'Pelanggan'}</td>
                <td class="p-4 text-sm font-black text-right ${isVoid ? 'text-red-400' : 'text-blue-600'}">
                    Rp${item.total.toLocaleString()}
                    ${isVoid ? '<br><span class="text-[8px] text-red-600 font-black uppercase">[Dibatalkan]</span>' : ''}
                </td>
                <td class="p-4 text-right">
                    ${!isVoid ? `
                        <button onclick="voidTransaksi('${key}')" class="text-slate-300 hover:text-red-500 transition-colors">
                            <i data-lucide="x-circle" class="w-4 h-4"></i>
                        </button>
                    ` : `<span class="text-[9px] text-slate-300 italic">${item.voidAt || ''}</span>`}
                </td>
            </tr>`;
            });

            list.innerHTML = html;
            totalDisplay.textContent = `Rp${grandTotal.toLocaleString()}`;
            lucide.createIcons();
        }

        async function voidTransaksi(key) {
            if (confirm('Batalkan transaksi ini?')) {
                const today = new Date().toLocaleDateString('en-CA');
                try {
                    await db.ref(`history/${today}/${key}`).update({
                        status: 'void',
                        voidAt: new Date().toLocaleTimeString('id-ID')
                    });
                } catch (e) { alert("Gagal membatalkan transaksi"); }
            }
        }

        async function selesaikanPesanan(num) {
            if (confirm(`Tandai pesanan Meja ${num} sebagai SELESAI?`)) {
                try {
                    const snap = await db.ref('tables/' + num + '/orderDetail').once('value');
                    const orderData = snap.val();
                    if (orderData) {
                        const today = new Date().toLocaleDateString('en-CA');
                        await db.ref('history/' + today).push({
                            ...orderData,
                            meja: num,
                            status: 'success', // Status awal saat selesai
                            completedAt: new Date().toLocaleTimeString('id-ID')
                        });
                        await db.ref('tables/' + num + '/orderDetail').remove();
                    }
                } catch (error) { alert("Gagal memproses transaksi."); }
            }
        }

        async function kosongkanMeja(num) {
            if (confirm(`Meja ${num} sudah kosong?`)) {
                await db.ref('tables/' + num).set({ status: 'available' });
            }
        }

        async function resetSemuaMeja() {
            if (confirm('Hapus semua status dan pesanan meja?')) {
                const updates = {};
                for (let i = 1; i <= 15; i++) updates[i] = { status: 'available' };
                await db.ref('tables').set(updates);
            }
        }

        setInterval(() => {
            const el = document.getElementById('liveClock');
            if (el) el.textContent = new Date().toLocaleString('id-ID', { dateStyle: 'full', timeStyle: 'medium' });
        }, 1000);

        document.addEventListener('DOMContentLoaded', () => {
            watchFirebase();
            lucide.createIcons();
        });

    </script>


</body>

</html>
