<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atelier Apex - Order from Table</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://app.sandbox.midtrans.com/snap/snap.js" data-client-key="Mid-client-C18PvX12qvdRKwbI"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .serif {
            font-family: 'Playfair Display', serif;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .active-category {
            background: #2563eb;
            color: white;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 pb-24">

    <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-100 p-4">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="serif text-xl font-bold">Atelier <span class="text-blue-600">Apex</span></h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest" id="displayMeja">Meja --</p>
            </div>
            <div class="bg-blue-50 px-3 py-1 rounded-full">
                <span class="text-[10px] font-bold text-blue-600 uppercase">Self-Service</span>
            </div>
        </div>
    </header>

    <div
        class="sticky top-[65px] z-30 bg-white border-b border-slate-100 overflow-x-auto hide-scrollbar flex gap-2 p-3">
        <button class="active-category px-4 py-2 rounded-full text-xs font-semibold whitespace-nowrap">Semua</button>
        <button
            class="bg-slate-100 text-slate-600 px-4 py-2 rounded-full text-xs font-semibold whitespace-nowrap">Coffee</button>
        <button
            class="bg-slate-100 text-slate-600 px-4 py-2 rounded-full text-xs font-semibold whitespace-nowrap">Non-Coffee</button>
        <button
            class="bg-slate-100 text-slate-600 px-4 py-2 rounded-full text-xs font-semibold whitespace-nowrap">Pastry</button>
    </div>

    <main class="p-4 grid grid-cols-1 gap-4" id="menuGrid">
    </main>

    <div id="cartBar"
        class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 p-4 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] transform translate-y-full transition-transform duration-300 z-50">
        <div class="flex items-center justify-between gap-4">
            <div class="flex flex-col">
                <span class="text-[10px] font-bold text-slate-400 uppercase">Total Pesanan</span>
                <span class="text-lg font-black text-blue-600" id="cartTotal">IDR 0</span>
            </div>
            <button onclick="openCheckout()"
                class="flex-1 bg-blue-600 text-white py-3 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 shadow-lg shadow-blue-200">
                Lanjut Checkout <i data-lucide="arrow-right" class="w-4 h-4"></i>
            </button>
        </div>
    </div>

    <div id="checkoutModal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeCheckout()"></div>
        <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[2.5rem] p-6 max-h-[90vh] overflow-y-auto">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>

            <h2 class="serif text-2xl font-bold mb-2 text-center">Konfirmasi Pesanan</h2>
            <p class="text-center text-xs text-slate-400 mb-6">Pastikan pesanan Anda sudah sesuai</p>

            <div class="mb-6">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-2">Nama Pemesan
                    *</label>
                <input type="text" id="customerName" placeholder="Contoh: Budi"
                    class="w-full bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 transition-all font-medium">
            </div>

            <div id="checkoutItems" class="space-y-4 mb-6">
            </div>

            <div class="bg-slate-50 rounded-2xl p-4 space-y-2 mb-8">
                <div class="flex justify-between text-xs text-slate-500"><span>Subtotal</span><span id="checkSub">IDR
                        0</span></div>
                <div class="flex justify-between text-xs text-slate-500"><span>Biaya Layanan (5%)</span><span
                        id="checkService">IDR 0</span></div>
                <div class="flex justify-between text-xs text-slate-500"><span>PPN (10%)</span><span id="checkTax">IDR
                        0</span></div>
                <div class="flex justify-between font-bold text-blue-600 border-t pt-2 mt-2"><span>Total
                        Akhir</span><span id="checkTotal">IDR 0</span></div>
            </div>

            <button onclick="prosesBayar()"
                class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold text-sm shadow-xl shadow-blue-100">
                Bayar Sekarang
            </button>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG (Sesuai Dashboard Kasir Anda)
        const firebaseConfig = {
            apiKey: "AIzaSyCQuohmYq7Q_eR7OpfjrVgdRitOgqcX2GY",
            authDomain: "cafe-order-system-f7024.firebaseapp.com",
            projectId: "cafe-order-system-f7024",
            storageBucket: "cafe-order-system-f7024.firebasestorage.app",
            messagingSenderId: "903604964032",
            appId: "1:903604964032:web:ab5c8efd4acf36b4943b25",
            databaseURL: "https://cafe-order-system-f7024-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let mejaAktif = null;
        let cart = [];

        // Data Menu (Bisa disamakan dengan index.html)
        const menuItems = [
            { id: 101, name: "Signature Latte", price: 35000, category: "Coffee", image: "https://images.unsplash.com/photo-1541167760496-162955ed8a9f?w=400" },
            { id: 102, name: "Iced Americano", price: 28000, category: "Coffee", image: "https://images.unsplash.com/photo-1517701550927-30cf4ba1dba5?w=400" },
            { id: 201, name: "Matcha Glaze Pastry", price: 32000, category: "Pastry", image: "https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=400" }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const mejaUrl = params.get('meja');

            if (mejaUrl) {
                mejaAktif = mejaUrl;
                document.getElementById('displayMeja').textContent = `Meja ${mejaUrl}`;
            } else {
                alert("QR Code tidak valid. Silakan scan ulang di meja Anda.");
            }

            renderMenu();
            lucide.createIcons();
        });

        function renderMenu() {
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = menuItems.map(item => `
                <div class="bg-white rounded-[2rem] p-4 flex gap-4 border border-slate-100">
                    <img src="${item.image}" class="w-24 h-24 rounded-2xl object-cover">
                    <div class="flex-1 flex flex-col justify-between py-1">
                        <div>
                            <h3 class="font-bold text-sm text-slate-800">${item.name}</h3>
                            <p class="text-blue-600 font-black text-sm mt-1">IDR ${item.price.toLocaleString()}</p>
                        </div>
                        <div class="flex items-center justify-end gap-3">
                            <button onclick="updateQty(${item.id}, -1)" class="w-8 h-8 rounded-full border border-slate-200 flex items-center justify-center text-slate-400"><i data-lucide="minus" class="w-4 h-4"></i></button>
                            <span id="qty-${item.id}" class="font-bold text-sm">0</span>
                            <button onclick="updateQty(${item.id}, 1)" class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center"><i data-lucide="plus" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function updateQty(id, change) {
            const item = menuItems.find(i => i.id === id);
            const cartItem = cart.find(i => i.id === id);

            if (cartItem) {
                cartItem.qty += change;
                if (cartItem.qty <= 0) cart = cart.filter(i => i.id !== id);
            } else if (change > 0) {
                cart.push({ ...item, qty: 1 });
            }

            document.getElementById(`qty-${id}`).textContent = cart.find(i => i.id === id)?.qty || 0;
            updateCartBar();
        }

        function updateCartBar() {
            const bar = document.getElementById('cartBar');
            const total = cart.reduce((acc, curr) => acc + (curr.price * curr.qty), 0);

            if (cart.length > 0) {
                bar.classList.remove('translate-y-full');
                document.getElementById('cartTotal').textContent = `IDR ${total.toLocaleString()}`;
            } else {
                bar.classList.add('translate-y-full');
            }
        }

        function openCheckout() {
            const modal = document.getElementById('checkoutModal');
            modal.classList.remove('hidden');

            const subtotal = cart.reduce((acc, curr) => acc + (curr.price * curr.qty), 0);
            const service = Math.round(subtotal * 0.05);
            const tax = Math.round(subtotal * 0.10);
            const total = subtotal + service + tax;

            document.getElementById('checkSub').textContent = `IDR ${subtotal.toLocaleString()}`;
            document.getElementById('checkService').textContent = `IDR ${service.toLocaleString()}`;
            document.getElementById('checkTax').textContent = `IDR ${tax.toLocaleString()}`;
            document.getElementById('checkTotal').textContent = `IDR ${total.toLocaleString()}`;

            document.getElementById('checkoutItems').innerHTML = cart.map(i => `
                <div class="flex justify-between items-center text-sm">
                    <span class="text-slate-600 font-medium">${i.qty}x ${i.name}</span>
                    <span class="font-bold">IDR ${(i.price * i.qty).toLocaleString()}</span>
                </div>
            `).join('');
        }

        function closeCheckout() {
            document.getElementById('checkoutModal').classList.add('hidden');
        }

        async function prosesBayar() {
            const nameInput = document.getElementById('customerName').value.trim();
            if (!nameInput) return alert("Mohon masukkan nama Anda");
            if (!mejaAktif) return alert("Nomor meja tidak terdeteksi");

            const subtotal = cart.reduce((acc, curr) => acc + (curr.price * curr.qty), 0);
            const total = subtotal + Math.round(subtotal * 0.05) + Math.round(subtotal * 0.10);

            // 1. Simpan ke Firebase
            try {
                await db.ref('tables/' + mejaAktif).update({
                    status: 'occupied',
                    orderDetail: {
                        items: cart,
                        total: total,
                        time: new Date().toLocaleTimeString('id-ID'),
                        customerName: nameInput
                    }
                });
            } catch (err) { console.error(err); }

            // 2. Midtrans
            try {
                const res = await fetch("/.netlify/functions/createTransaction", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ items: cart, total: total, customerName: nameInput })
                });

                const data = await res.json();
                snap.pay(data.token, {
                    onSuccess: () => location.reload(),
                    onPending: () => location.reload()
                });
            } catch (error) {
                alert("Gagal memproses pembayaran. Hubungi kasir.");
            }
        }
    </script>
</body>

</html>
