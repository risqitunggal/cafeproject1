            { id: 38, category: 'Dining', name: 'Sushi Platter', price: 132000, img: 'https://images.unsplash.com/photo-1579871494447-9811cf80d66c?w=500&q=80' },
            { id: 39, category: 'Dining', name: 'Ramen Bowl', price: 85000, img: 'https://images.unsplash.com/photo-1617093727343-374698b1b08d?w=500&q=80' },
            { id: 40, category: 'Dining', name: 'Pizza Slice', price: 95000, img: 'https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500&q=80' }
        ];

        let activeCategory = 'Coffee';
        let cart = JSON.parse(localStorage.getItem('atelier_cart') || '[]');
        let meja = null;

        function initTables() {
            const grid = document.getElementById('tableGrid');
            let html = '';
            for (let i = 1; i <= 15; i++) {
                html += `<button onclick="selectTable(${i}, this)" class="table-btn bg-white border border-slate-200 rounded-3xl p-6 font-bold text-lg">${String(i).padStart(2, '0')}</button>`;
            }
            grid.innerHTML = html;
        }

        function selectTable(num, el) {
            document.querySelectorAll('.table-btn').forEach(b => b.classList.remove('bg-blue-600', 'text-white'));
            el.classList.add('bg-blue-600', 'text-white');
            meja = num;
            setTimeout(startOrder, 180);
        }

        function startOrder() {
            document.getElementById('tableOverlay').classList.add('hidden');
            document.getElementById('deskInfo').textContent = 'MEJA ' + meja;
            document.getElementById('deskInfoMobile').textContent = 'MEJA ' + meja;
        }

        function renderNav() {
    const d = document.getElementById('desktopNav');
    const m = document.getElementById('mobileNav');

    d.innerHTML = '';
    m.innerHTML = '';

    categories.forEach(cat => {

        const active = cat === activeCategory;
        const icon = CATEGORY_ICONS[cat];

        d.innerHTML += `
        <button onclick="setCategory('${cat}')" 
        class="w-full flex items-center gap-3 px-4 py-4 rounded-2xl font-semibold
        ${active ? 'bg-white text-blue-600 shadow' : 'text-slate-600'}">

        <i data-lucide="${icon}" class="w-4 h-4"></i>
        ${cat}

        </button>
        `;

        m.innerHTML += `
        <button onclick="setCategory('${cat}')" 
        class="flex items-center gap-2 px-4 py-2 rounded-full text-sm whitespace-nowrap
        ${active ? 'bg-blue-600 text-white' : 'bg-white'}">

        <i data-lucide="${icon}" class="w-4 h-4"></i>
        ${cat}

        </button>
        `;
    });

    lucide.createIcons();
}

        function setCategory(cat) { activeCategory = cat; renderNav(); renderMenu(); }

        function getSearch() {
            return (document.getElementById('searchDesktop')?.value || document.getElementById('searchMobile')?.value || '').toLowerCase();
        }

        function renderMenu() {
            const q = getSearch();
            const items = DB_MENU.filter(i => i.category === activeCategory && i.name.toLowerCase().includes(q));
            const grid = document.getElementById('menuGrid');
            document.getElementById('categoryTitle').textContent = activeCategory;
            grid.innerHTML = items.map(item => `<div class='menu-card bg-white rounded-3xl p-4 border border-slate-100'>
    <img src='${item.img}' class='w-full aspect-[16/10] object-cover rounded-2xl'>
    <h4 class='font-bold mt-4'>${item.name}</h4>
    <p class='text-blue-600 text-sm font-bold mt-1'>IDR ${item.price.toLocaleString('id-ID')}</p>
    <div class='mt-4 flex items-center justify-between gap-3'>
      <div class='flex items-center gap-2'>
        <button onclick='changeMenuQty(${item.id},-1)' class='w-9 h-9 rounded-xl bg-slate-100 font-bold'>-</button>
        <span id='menu-qty-${item.id}' class='min-w-[24px] text-center font-bold text-sm'>0</span>
        <button onclick='changeMenuQty(${item.id},1)' class='w-9 h-9 rounded-xl bg-slate-100 font-bold'>+</button>
      </div>
      <button onclick='addToCart(${item.id})' class='flex-1 py-3 rounded-2xl bg-slate-900 text-white text-sm font-semibold'>Tambah</button>
    </div>
  </div>`).join('') || `<div class='text-slate-400'>Menu tidak ditemukan.</div>`;
        }

        function changeMenuQty(id, delta) {
            const el = document.getElementById(`menu-qty-${id}`);
            if (!el) return;
            const next = Math.max(0, (parseInt(el.textContent) || 0) + delta);
            el.textContent = next;
        }

        function addToCart(id) {
            const item = DB_MENU.find(x => x.id === id);
            const qty = parseInt(document.getElementById(`menu-qty-${id}`)?.textContent || '0');
            if (qty <= 0) return;
            const ex = cart.find(x => x.id === id);
            if (ex) ex.qty += qty;
            else cart.push({ ...item, qty });
            const qtyEl = document.getElementById(`menu-qty-${id}`);
            if (qtyEl) qtyEl.textContent = '0';
            persist();
            updateCart();
        }

        function changeQty(id, delta) {
            const item = cart.find(x => x.id === id);
            if (!item) return;
            item.qty += delta;
            if (item.qty <= 0) cart = cart.filter(x => x.id !== id);
            persist();
            updateCart();
        }

        function removeItem(id) {
            cart = cart.filter(x => x.id !== id);
            persist();
            updateCart();
        }

        function persist() {
            localStorage.setItem('atelier_cart', JSON.stringify(cart));
        }

        function updateCart() {
            const wrap = document.getElementById('cartItems');
            const count = cart.reduce((a, b) => a + b.qty, 0);
            const subtotal = cart.reduce((a, b) => a + b.price * b.qty, 0);
            const service = Math.round(subtotal * 0.05);
            const tax = Math.round(subtotal * 0.10);
            const total = subtotal + service + tax;

            document.getElementById('cartBadge').textContent = count;
            document.getElementById('cartBadge').classList.toggle('hidden', count === 0);

            wrap.innerHTML = cart.length ? cart.map(i => `<div class='flex gap-3 items-center border border-slate-100 rounded-2xl p-3'>
    <img src='${i.img}' class='w-16 h-16 rounded-2xl object-cover'>
    <div class='flex-1 min-w-0'>
      <p class='font-semibold text-sm'>${i.name}</p>
      <div class='flex items-center gap-3 mt-2'>
        <button onclick='changeQty(${i.id},-1)' class='px-2 py-1 bg-slate-100 rounded'>-</button>
        <span class='text-sm font-bold'>${i.qty}</span>
        <button onclick='changeQty(${i.id},1)' class='px-2 py-1 bg-slate-100 rounded'>+</button>
      </div>
    </div>
    <div class='flex items-center gap-2 shrink-0'>
      <p class='font-bold text-xs min-w-[90px] text-right'>IDR ${(i.price * i.qty).toLocaleString('id-ID')}</p>
      <button onclick='removeItem(${i.id})' class='flex items-center justify-center w-9 h-9 text-red-600 bg-red-50 border border-red-200 hover:bg-red-100 rounded-xl shadow-sm'>
        <i data-lucide='trash-2' class='w-4 h-4'></i>
      </button>
    </div>
  </div>`).join('') : `<div class='text-center text-slate-400 py-10'>Keranjang masih kosong</div>`;

            document.getElementById('subtotal').textContent = 'IDR ' + subtotal.toLocaleString('id-ID');
            document.getElementById('service').textContent = 'IDR ' + service.toLocaleString('id-ID');
            document.getElementById('tax').textContent = 'IDR ' + tax.toLocaleString('id-ID');
            document.getElementById('grand').textContent = 'IDR ' + total.toLocaleString('id-ID');

            lucide.createIcons();
        }

        function toggleDrawer(open) {
            document.getElementById('drawer').classList.toggle('translate-x-full', !open);
            document.getElementById('overlay').classList.toggle('hidden', !open);
        }



        document.getElementById('searchDesktop').addEventListener('input', renderMenu);
        document.getElementById('searchMobile').addEventListener('input', renderMenu);

        document.addEventListener('DOMContentLoaded', () => {
            const overlay = document.getElementById('tableOverlay');
            if (overlay) overlay.classList.remove('hidden');
            initTables();
            renderNav();
            renderMenu();
            updateCart();
            lucide.createIcons();
            const menuGrid = document.getElementById('menuGrid');
            const backBtn = document.getElementById('backToTop');
            menuGrid.addEventListener('scroll', () => {
                backBtn.classList.toggle('hidden', menuGrid.scrollTop < 300);
            });
        });


        
        async function checkout(){

const subtotal = cart.reduce((a,b)=>a+b.price*b.qty,0)
const service = Math.round(subtotal*0.05)
const tax = Math.round(subtotal*0.10)
const total = subtotal+service+tax

const res = await fetch("/.netlify/functions/createTransaction",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
items:cart,
total:total
})
})

const data = await res.json()

console.log("Response Midtrans:",data)

if(!data.token){
alert("Token pembayaran tidak diterima")
return
}

snap.pay(data.token)

}


    </script>
    <button id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})"
        class="fixed bottom-6 right-6 z-30 hidden w-12 h-12 rounded-full bg-sky-100/90 backdrop-blur border border-sky-200 shadow-xl hover:shadow-2xl hover:bg-sky-200 flex items-center justify-center transition-all duration-300">
        <i data-lucide="arrow-up" class="w-5 h-5 text-sky-700"></i>
    </button>
</body>
