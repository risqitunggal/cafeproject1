<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atelier Apex | Luxury Dining Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://app.sandbox.midtrans.com/snap/snap.js" data-client-key="Mid-client-C18PvX12qvdRKwbI"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --accent: #2563eb;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fcfcfd;
            scroll-behavior: smooth;
        }

        .serif {
            font-family: 'Playfair Display', serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .menu-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade {
            animation: fadeIn 0.6s ease forwards;
        }

        .cat-btn.active {
            background: #1e293b;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .sticky-cat {
            position: sticky;
            top: 72px;
            z-index: 40;
        }

        #mobileSidebar {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .no-scroll {
            overflow: hidden;
            height: 100vh;
        }
    </style>
</head>

<body class="text-slate-900 leading-relaxed">

    <nav class="sticky top-0 z-50 glass border-b border-slate-100 p-4 lg:px-12 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar(true)" class="lg:hidden p-2.5 bg-slate-100 rounded-full active:scale-90">
                <i data-lucide="menu" class="w-5 h-5 text-slate-700"></i>
            </button>
            <div>
                <h1 class="serif text-2xl font-bold italic">Atelier <span class="text-blue-600">Apex</span></h1>
                <div class="flex items-center gap-2 mt-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest" id="displayMeja">Meja --
                    </p>
                </div>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <button onclick="openCheckout()"
                class="flex items-center gap-2 px-6 py-2.5 bg-slate-900 text-white rounded-full text-sm font-bold shadow-lg active:scale-95">
                <i data-lucide="shopping-bag" class="w-4 h-4"></i>
                <span id="cartCount" class="bg-blue-600 px-1.5 rounded-md text-[10px]">0</span>
            </button>
        </div>
    </nav>

    <div id="sidebarContainer" class="fixed inset-0 z-[200] hidden">
        <div onclick="toggleSidebar(false)" id="sidebarOverlay"
            class="absolute inset-0 bg-slate-950/40 backdrop-blur-sm opacity-0 transition-opacity"></div>
        <div id="mobileSidebar"
            class="absolute left-0 top-0 bottom-0 w-[80%] max-w-sm bg-white shadow-2xl -translate-x-full flex flex-col">
            <div class="p-8 border-b flex justify-between items-center">
                <h2 class="serif text-2xl font-bold italic">Menu</h2>
                <button onclick="toggleSidebar(false)" class="p-2 bg-slate-50 rounded-full"><i data-lucide="x"
                        class="w-5 h-5"></i></button>
            </div>
            <div class="p-8 flex-1 space-y-6">
                <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest">Main Menu</p>
                <a href="#" class="flex items-center gap-4 text-lg font-bold text-slate-900 group">
                    <div
                        class="w-10 h-10 rounded-2xl bg-blue-50 flex items-center justify-center text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-all">
                        <i data-lucide="utensils" class="w-5 h-5"></i>
                    </div>
                    Daftar Menu
                </a>
            </div>
        </div>
    </div>

    <header
        class="relative h-[25vh] lg:h-[35vh] overflow-hidden flex items-center justify-center text-center p-6 bg-slate-900">
        <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=1600"
            class="absolute inset-0 w-full h-full object-cover opacity-50">
        <div class="relative z-10">
            <h2 class="serif text-3xl lg:text-5xl text-white mb-4 animate-fade italic">A Masterpiece in Every Sip</h2>
            <p class="text-slate-200 text-xs font-light tracking-wide max-w-md mx-auto opacity-80">Nikmati kurasi menu
                terbaik kami yang dirancang khusus untuk Anda.</p>
        </div>
    </header>

    <section class="sticky-cat max-w-7xl mx-auto px-4 lg:px-12 -mt-8">
        <div
            class="bg-white/95 backdrop-blur shadow-xl rounded-3xl p-3 flex gap-3 overflow-x-auto hide-scrollbar border border-white">
            <button onclick="filterMenu('Semua', this)"
                class="cat-btn active px-8 py-3 rounded-2xl text-xs font-bold whitespace-nowrap transition-all uppercase tracking-widest">Semua</button>
            <button onclick="filterMenu('Coffee', this)"
                class="cat-btn bg-slate-50 text-slate-500 px-8 py-3 rounded-2xl text-xs font-bold whitespace-nowrap transition-all uppercase tracking-widest">Coffee</button>
            <button onclick="filterMenu('Tea', this)"
                class="cat-btn bg-slate-50 text-slate-500 px-8 py-3 rounded-2xl text-xs font-bold whitespace-nowrap transition-all uppercase tracking-widest">Tea</button>
            <button onclick="filterMenu('Pastry', this)"
                class="cat-btn bg-slate-50 text-slate-500 px-8 py-3 rounded-2xl text-xs font-bold whitespace-nowrap transition-all uppercase tracking-widest">Pastry</button>
            <button onclick="filterMenu('Dining', this)"
                class="cat-btn bg-slate-50 text-slate-500 px-8 py-3 rounded-2xl text-xs font-bold whitespace-nowrap transition-all uppercase tracking-widest">Dining</button>
        </div>
    </section>


    <main class="max-w-7xl mx-auto p-4 lg:p-12 min-h-screen">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8" id="menuGrid">
        </div>
    </main>

    <div id="checkoutModal" class="fixed inset-0 z-[300] hidden">
        <div class="absolute inset-0 bg-slate-950/60 backdrop-blur-md" onclick="closeCheckout()"></div>
        <div class="absolute right-0 top-0 bottom-0 w-full max-w-lg bg-white shadow-2xl flex flex-col transform">
            <div class="px-8 py-6 border-b flex justify-between items-center sticky top-0 bg-white z-10">
                <h2 class="serif text-2xl font-bold">Pesanan Anda</h2>
                <button onclick="closeCheckout()" class="p-2 hover:bg-slate-100 rounded-full"><i data-lucide="x"
                        class="w-6 h-6"></i></button>
            </div>

            <div class="flex-1 overflow-y-auto p-6 lg:p-8 hide-scrollbar">
                <div class="mb-6 p-5 bg-slate-50 rounded-[1.5rem] border border-slate-100">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-3">Nama
                        Pelanggan</label>
                    <div class="relative">
                        <i data-lucide="user"
                            class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="text" id="customerName" placeholder="Tulis nama Anda..."
                            class="w-full bg-white border border-slate-200 rounded-xl pl-10 pr-4 py-3 text-sm focus:ring-2 focus:ring-blue-500/20 outline-none">
                    </div>
                </div>
                <div class="space-y-4" id="checkoutItems"></div>
            </div>

            <div class="p-6 bg-slate-50 border-t">
                <div class="space-y-2 mb-5 px-1">
                    <div class="flex justify-between text-[11px] text-slate-400 font-bold uppercase">
                        <span>Subtotal</span> <span id="checkSub" class="text-slate-600">IDR 0</span>
                    </div>
                    <div class="flex justify-between text-[11px] text-slate-400 font-bold uppercase"><span>Tax
                            (15%)</span> <span id="checkTax" class="text-slate-600">IDR 0</span></div>
                    <div class="flex justify-between items-center text-lg font-black text-slate-900 pt-3 border-t mt-2">
                        <span class="serif italic">Total</span> <span id="checkTotal" class="text-blue-600">IDR 0</span>
                    </div>
                </div>
                <button onclick="prosesBayar()"
                    class="w-full bg-slate-900 hover:bg-blue-600 text-white py-4 rounded-xl font-bold text-sm shadow-xl flex items-center justify-center gap-3">
                    Konfirmasi Pembayaran <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCQuohmYq7Q_eR7OpfjrVgdRitOgqcX2GY",
            authDomain: "cafe-order-system-f7024.firebaseapp.com",
            projectId: "cafe-order-system-f7024",
            storageBucket: "cafe-order-system-f7024.firebasestorage.app",
            messagingSenderId: "903604964032",
            appId: "1:903604964032:web:ab5c8efd4acf36b4943b25",
            databaseURL: "https://cafe-order-system-f7024-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let mejaAktif = null;
        let cart = [];
        let currentCategory = 'Semua';
        let allProducts = {
            // Data ini akan muncul langsung tanpa menunggu Firebase
            "p1": { nama: "Signature Espresso", harga: 35000, kategori: "Coffee", stok: "available", gambar: "https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?w=400", deskripsi: "Biji kopi pilihan dengan ekstraksi sempurna." },
            "p2": { nama: "Royal Earl Grey", harga: 32000, kategori: "Tea", stok: "available", gambar: "https://images.unsplash.com/photo-1594631252845-29fc458695d7?w=400", deskripsi: "Teh hitam premium dengan aroma bergamot." },
            "p3": { nama: "Butter Croissant", harga: 28000, kategori: "Pastry", stok: "available", gambar: "https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=400", deskripsi: "Pastry renyah dengan mentega Prancis." },
            "p4": { nama: "Wagyu Steak", harga: 245000, kategori: "Dining", stok: "available", gambar: "https://images.unsplash.com/photo-1600891964599-f61ba0e24092?w=400", deskripsi: "Daging wagyu grade MB5+ dengan saus khas." }
        };

        // 1. Monitor Data Menu dari Firebase secara Real-time
        function watchFirebaseMenu() {
            db.ref('products').on('value', (snapshot) => {
                allProducts = snapshot.val() || {};
                renderMenu();
            });
        }

        document.addEventListener('DOMContentLoaded', () => {

            renderMenu(); // Tambahkan ini agar menu muncul seketika
            watchFirebaseMenu();
            lucide.createIcons();

            const params = new URLSearchParams(window.location.search);
            const mejaUrl = params.get('meja');
            if (mejaUrl) {
                mejaAktif = mejaUrl;
                document.getElementById('displayMeja').textContent = `Executive Table ${mejaUrl}`;
            }
            watchFirebaseMenu(); // Jalankan listener Firebase
            lucide.createIcons();
        });

        function renderMenu() {
            const grid = document.getElementById('menuGrid');
            let html = '';

            Object.entries(allProducts).forEach(([id, item]) => {
                // Logika Filter
                if (currentCategory === 'Semua' || item.kategori.toLowerCase() === currentCategory.toLowerCase()) {
                    const cartItem = cart.find(c => c.id === id);
                    const currentQty = cartItem ? cartItem.qty : 0;
                    const isAvailable = item.stok === 'available';

                    html += `
                    <div class="menu-card bg-white rounded-[2rem] overflow-hidden border border-slate-100 shadow-sm animate-fade ${!isAvailable ? 'opacity-60 grayscale' : ''}">
                        <div class="h-60 overflow-hidden relative group">
                            <img src="${item.gambar}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                            <div class="absolute top-4 right-4 bg-white/90 backdrop-blur-md px-3 py-1 rounded-full text-[9px] font-black tracking-widest uppercase text-blue-600">
                                ${item.kategori}
                            </div>
                            ${!isAvailable ? '<div class="absolute inset-0 bg-black/40 flex items-center justify-center font-bold text-white uppercase tracking-[0.3em]">Sold Out</div>' : ''}
                        </div>
                        <div class="p-6">
                            <h3 class="serif text-lg font-bold text-slate-900 mb-1">${item.nama}</h3>
                            <p class="text-[11px] text-slate-400 font-medium mb-4 line-clamp-2">${item.deskripsi || ''}</p>
                            <div class="flex justify-between items-center">
                                <span class="text-base font-black text-slate-900">IDR ${parseInt(item.harga).toLocaleString()}</span>
                                <div class="flex items-center bg-slate-50 p-1 rounded-xl gap-2.5 border border-slate-100">
                                    <button onclick="updateQty('${id}', -1)" ${!isAvailable ? 'disabled' : ''} class="w-7 h-7 flex items-center justify-center rounded-lg bg-white text-slate-400 hover:text-red-500 shadow-sm active:scale-90">
                                        <i data-lucide="minus" class="w-3.5 h-3.5"></i>
                                    </button>
                                    <span id="qty-grid-${id}" class="text-xs font-bold w-3 text-center">${currentQty}</span>
                                    <button onclick="updateQty('${id}', 1)" ${!isAvailable ? 'disabled' : ''} class="w-7 h-7 flex items-center justify-center rounded-lg bg-slate-900 text-white shadow-md active:scale-90">
                                        <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                }
            });

            grid.innerHTML = html || `<p class="col-span-full text-center py-20 text-slate-400">Menu belum tersedia.</p>`;
            lucide.createIcons();
        }

        function filterMenu(cat, btn) {
            // 1. Update kategori saat ini
            currentCategory = cat;

            // 2. Reset semua tombol ke tampilan non-aktif
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.remove('active');
                b.classList.add('bg-slate-50', 'text-slate-500');
            });

            // 3. Aktifkan tombol yang diklik
            // Jika dipanggil dari tombol (saat klik), btn akan ada isinya
            if (btn) {
                btn.classList.add('active');
                btn.classList.remove('bg-slate-50', 'text-slate-500');
            }

            // 4. Render ulang menu berdasarkan kategori yang baru dipilih
            renderMenu();
        }

        function updateQty(id, change) {
            const itemData = allProducts[id];
            if (!itemData) return;

            let cartItem = cart.find(i => i.id === id);

            if (cartItem) {
                cartItem.qty += change;
                if (cartItem.qty <= 0) cart = cart.filter(i => i.id !== id);
            } else if (change > 0) {
                cart.push({ id: id, name: itemData.nama, price: parseInt(itemData.harga), image: itemData.gambar, qty: 1 });
            }

            // UI Update
            document.getElementById('cartCount').textContent = cart.reduce((a, b) => a + b.qty, 0);
            const qtyDisplay = document.getElementById(`qty-grid-${id}`);
            if (qtyDisplay) qtyDisplay.textContent = cart.find(i => i.id === id)?.qty || 0;

            if (!document.getElementById('checkoutModal').classList.contains('hidden')) openCheckout();
        }

        function removeItem(id) {
            // Menghapus item dari array cart berdasarkan ID
            cart = cart.filter(i => i.id !== id);

            // Update badge jumlah keranjang di navbar
            document.getElementById('cartCount').textContent = cart.reduce((a, b) => a + b.qty, 0);

            // Update angka qty di grid menu (kembalikan ke 0)
            const qtyDisplay = document.getElementById(`qty-grid-${id}`);
            if (qtyDisplay) qtyDisplay.textContent = 0;

            // Refresh tampilan checkout atau tutup jika kosong
            if (cart.length === 0) {
                closeCheckout();
            } else {
                openCheckout();
            }
        }

        function toggleSidebar(open) {
            const container = document.getElementById('sidebarContainer');
            const overlay = document.getElementById('sidebarOverlay');
            const sidebar = document.getElementById('mobileSidebar');
            if (open) {
                container.classList.remove('hidden');
                document.body.classList.add('no-scroll');
                setTimeout(() => { overlay.classList.add('opacity-100'); sidebar.classList.remove('-translate-x-full'); }, 10);
            } else {
                overlay.classList.remove('opacity-100');
                sidebar.classList.add('-translate-x-full');
                document.body.classList.remove('no-scroll');
                setTimeout(() => { container.classList.add('hidden'); }, 400);
            }
        }

        function openCheckout() {
            if (cart.length === 0) return closeCheckout();
            document.getElementById('checkoutModal').classList.remove('hidden');

            const subtotal = cart.reduce((acc, curr) => acc + (curr.price * curr.qty), 0);
            const serviceTax = Math.round(subtotal * 0.15);
            const total = subtotal + serviceTax;

            document.getElementById('checkSub').textContent = `IDR ${subtotal.toLocaleString()}`;
            document.getElementById('checkTax').textContent = `IDR ${serviceTax.toLocaleString()}`;
            document.getElementById('checkTotal').textContent = `IDR ${total.toLocaleString()}`;

            document.getElementById('checkoutItems').innerHTML = cart.map(i => `
        <div class="flex gap-4 items-center bg-white p-4 rounded-2xl border border-slate-100 shadow-sm animate-fade">
            <img src="${i.image}" class="w-16 h-16 rounded-xl object-cover shadow-sm">
            
            <div class="flex-1">
                <h4 class="text-[14px] font-bold text-slate-800 mb-0.5">${i.name}</h4>
                <p class="text-[11px] text-blue-600 font-bold">IDR ${i.price.toLocaleString()}</p>
            </div>

            <div class="flex items-center gap-3">
                <div class="flex items-center bg-slate-100 p-1 rounded-xl gap-2 border border-slate-200">
                    <button onclick="updateQty('${i.id}', -1)" class="w-7 h-7 flex items-center justify-center rounded-lg bg-white text-slate-400 hover:text-red-500 shadow-sm transition-all active:scale-90">
                        <i data-lucide="minus" class="w-3.5 h-3.5"></i>
                    </button>
                    <span class="text-xs font-bold w-4 text-center text-slate-900">${i.qty}</span>
                    <button onclick="updateQty('${i.id}', 1)" class="w-7 h-7 flex items-center justify-center rounded-lg bg-slate-900 text-white shadow-sm transition-all active:scale-90">
                        <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                    </button>
                </div>

                <button onclick="removeItem('${i.id}')" 
                    class="w-9 h-9 flex items-center justify-center rounded-xl bg-red-50 text-red-500 hover:bg-red-500 hover:text-white border border-red-100 transition-all duration-300 shadow-sm active:scale-90"
                    title="Hapus item">
                    <i data-lucide="trash-2" class="w-4.5 h-4.5"></i>
                </button>
            </div>
        </div>`).join('');

            lucide.createIcons();
        }

        function closeCheckout() { document.getElementById('checkoutModal').classList.add('hidden'); }

        async function prosesBayar() {
            const name = document.getElementById('customerName').value.trim();
            if (!name) return alert("Mohon masukkan nama Anda.");
            if (!mejaAktif) return alert("Nomor meja tidak ditemukan.");

            const subtotal = cart.reduce((acc, curr) => acc + (curr.price * curr.qty), 0);
            const total = Math.round(subtotal * 1.15);

            try {
                // Update Firebase untuk notifikasi pesanan masuk
                await db.ref('tables/' + mejaAktif).update({
                    status: 'occupied',
                    orderDetail: { items: cart, total: total, customerName: name, time: new Date().toLocaleTimeString('id-ID') }
                });

                // Hit Midtrans Serverless Function (Netlify)
                const res = await fetch("/.netlify/functions/createTransaction", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ items: cart, total: total, customerName: name, table: mejaAktif })
                });
                const data = await res.json();
                if (data.token) snap.pay(data.token, { onSuccess: () => location.reload() });
            } catch (err) { alert("Error memproses pembayaran."); }
        }
    </script>
</body>

</html>
