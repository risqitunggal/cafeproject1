<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atelier Apex | Luxury Dining Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://app.sandbox.midtrans.com/snap/snap.js" data-client-key="Mid-client-C18PvX12qvdRKwbI"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --accent: #2563eb;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fcfcfd;
            scroll-behavior: smooth;
        }

        .serif {
            font-family: 'Playfair Display', serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .menu-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade {
            animation: fadeIn 0.6s ease forwards;
        }

        .cat-btn.active {
            background: #1e293b;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .sticky-cat {
            position: sticky;
            top: 72px;
            z-index: 40;
        }

        @media (min-width: 1024px) {
            .sticky-cat {
                top: 88px;
            }
        }

        /* Sidebar Transition */
        #mobileSidebar {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-overlay {
            transition: opacity 0.4s ease;
        }


        /* Tambahkan di dalam tag <style> */
.no-scroll {
    overflow: hidden;
    height: 100vh;
}


    </style>
</head>

<body class="text-slate-900 leading-relaxed">

    <nav class="sticky top-0 z-50 glass border-b border-slate-100 p-4 lg:px-12 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar(true)"
                class="lg:hidden p-2.5 bg-slate-100 rounded-full active:scale-90 transition-transform">
                <i data-lucide="menu" class="w-5 h-5 text-slate-700"></i>
            </button>
            <div>
                <h1 class="serif text-2xl font-bold tracking-tight text-slate-900 italic leading-none">Atelier <span
                        class="text-blue-600">Apex</span></h1>
                <div class="flex items-center gap-2 mt-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-[0.2em]" id="displayMeja">Meja --
                    </p>
                </div>
            </div>
        </div>

        <div class="hidden lg:flex items-center gap-10 text-xs font-bold uppercase tracking-widest text-slate-400">
            <a href="#" class="text-slate-900 border-b-2 border-blue-600 pb-1">Menu</a>
            <a href="#" class="hover:text-slate-900 transition-colors">Informasi</a>
            <a href="#" class="hover:text-slate-900 transition-colors">Bantuan</a>
        </div>

        <div class="flex items-center gap-3">
            <button onclick="openCheckout()"
                class="flex items-center gap-2 px-6 py-2.5 bg-slate-900 text-white rounded-full text-sm font-bold shadow-lg transition-transform active:scale-95">
                <i data-lucide="shopping-bag" class="w-4 h-4"></i>
                <span id="cartCount" class="bg-blue-600 px-1.5 rounded-md text-[10px]">0</span>
            </button>
        </div>
    </nav>

    <div id="sidebarContainer" class="fixed inset-0 z-[200] hidden">
        <div onclick="toggleSidebar(false)" id="sidebarOverlay"
            class="absolute inset-0 bg-slate-950/40 backdrop-blur-sm opacity-0 transition-opacity"></div>

        <div id="mobileSidebar"
            class="absolute left-0 top-0 bottom-0 w-[80%] max-w-sm bg-white shadow-2xl transform -translate-x-full flex flex-col">
            <div class="p-8 border-b border-slate-50 flex justify-between items-center">
                <h2 class="serif text-2xl font-bold italic">Atelier <span class="text-blue-600">Apex</span></h2>
                <button onclick="toggleSidebar(false)" class="p-2 bg-slate-50 rounded-full"><i data-lucide="x"
                        class="w-5 h-5"></i></button>
            </div>

            <div class="p-8 space-y-8 flex-1">
                <div class="space-y-6">
                    <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.3em]">Main Menu</p>
                    <a href="#" onclick="toggleSidebar(false)" class="flex items-center gap-4 text-lg font-bold text-slate-900 group">
    <div class="w-10 h-10 rounded-2xl bg-blue-50 flex items-center justify-center text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-all">
        <i data-lucide="utensils" class="w-5 h-5"></i>
    </div>
    Daftar Menu
</a>
                    <a href="#" class="flex items-center gap-4 text-lg font-bold text-slate-900 group">
                        <div
                            class="w-10 h-10 rounded-2xl bg-slate-50 flex items-center justify-center text-slate-400 group-hover:bg-slate-900 group-hover:text-white transition-all">
                            <i data-lucide="info" class="w-5 h-5"></i></div>
                        Informasi
                    </a>
                    <a href="#" class="flex items-center gap-4 text-lg font-bold text-slate-900 group">
                        <div
                            class="w-10 h-10 rounded-2xl bg-slate-50 flex items-center justify-center text-slate-400 group-hover:bg-slate-900 group-hover:text-white transition-all">
                            <i data-lucide="help-circle" class="w-5 h-5"></i></div>
                        Bantuan
                    </a>
                </div>
            </div>

            <div class="p-8 border-t border-slate-50 bg-slate-50/50">
                <div class="flex items-center gap-3 mb-4">
                    <img src="https://ui-avatars.com/api/?name=User&background=cbd5e1&color=64748b"
                        class="w-10 h-10 rounded-full border-2 border-white shadow-sm">
                    <div>
                        <p class="text-xs font-bold text-slate-800" id="sidebarUser">Guest Customer</p>
                        <p class="text-[10px] text-slate-400 font-medium" id="sidebarMejaInfo">Table --</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <header
        class="relative h-[25vh] lg:h-[35vh] overflow-hidden flex items-center justify-center text-center p-6 bg-slate-900">
        <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=1600"
            class="absolute inset-0 w-full h-full object-cover opacity-50">
        <div class="relative z-10 max-w-2xl">
            <h2 class="serif text-3xl lg:text-5xl text-white mb-4 animate-fade italic">A Masterpiece in Every Sip</h2>
            <p class="text-slate-200 text-xs lg:text-sm font-light tracking-wide max-w-md mx-auto opacity-80">Nikmati
                kurasi menu terbaik kami yang dirancang khusus untuk Anda.</p>
        </div>
    </header>

    <section class="sticky-cat max-w-7xl mx-auto px-4 lg:px-12 -mt-8">
    <div class="bg-white/95 backdrop-blur shadow-xl shadow-slate-200/50 rounded-3xl p-3 flex gap-3 overflow-x-auto hide-scrollbar border border-white">
        <button onclick="filterMenu('Semua')"
            class="cat-btn active px-8 py-3 rounded-2xl text-xs font-bold whitespace-nowrap transition-all uppercase tracking-widest">Semua</button>
        <button onclick="filterMenu('Coffee')"
            class="cat-btn bg-slate-50 text-slate-500 px-8 py-3 rounded-2xl text-xs font-bold whitespace-nowrap transition-all uppercase tracking-widest">Coffee</button>
        <button onclick="filterMenu('Tea')"
            class="cat-btn bg-slate-50 text-slate-500 px-8 py-3 rounded-2xl text-xs font-bold whitespace-nowrap transition-all uppercase tracking-widest">Tea</button>
        <button onclick="filterMenu('Pastry')"
            class="cat-btn bg-slate-50 text-slate-500 px-8 py-3 rounded-2xl text-xs font-bold whitespace-nowrap transition-all uppercase tracking-widest">Pastry</button>
        <button onclick="filterMenu('Dining')"
            class="cat-btn bg-slate-50 text-slate-500 px-8 py-3 rounded-2xl text-xs font-bold whitespace-nowrap transition-all uppercase tracking-widest">Dining</button>
    </div>
</section>

    <main class="max-w-7xl mx-auto p-4 lg:p-12 min-h-screen">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8" id="menuGrid">
        </div>
    </main>

    <div id="checkoutModal" class="fixed inset-0 z-[300] hidden">
        <div class="absolute inset-0 bg-slate-950/60 backdrop-blur-md transition-opacity" onclick="closeCheckout()">
        </div>
        <div
            class="absolute right-0 top-0 bottom-0 w-full max-w-lg bg-white shadow-2xl flex flex-col transform transition-transform duration-500 ease-out">
            <div
                class="px-8 py-6 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0 z-10">
                <h2 class="serif text-2xl font-bold">Pesanan Anda</h2>
                <button onclick="closeCheckout()" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto p-6 lg:p-8 hide-scrollbar">
                <div class="mb-6 p-5 bg-slate-50 rounded-[1.5rem] border border-slate-100">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] block mb-3">Nama
                        Pelanggan</label>
                    <div class="relative">
                        <i data-lucide="user"
                            class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                        <input type="text" id="customerName" placeholder="Tulis nama Anda..."
                            class="w-full bg-white border border-slate-200 rounded-xl pl-10 pr-4 py-3 text-sm font-medium focus:ring-2 focus:ring-blue-500/20 outline-none transition-all">
                    </div>
                </div>
                <div class="space-y-4" id="checkoutItems"></div>
            </div>

            <div class="p-6 bg-slate-50/80 border-t border-slate-100 sticky bottom-0">
                <div class="space-y-1.5 mb-5 px-1">
                    <div class="flex justify-between text-[11px] text-slate-400 font-bold uppercase tracking-wider">
                        <span>Subtotal</span>
                        <span id="checkSub" class="text-slate-600 font-black">IDR 0</span>
                    </div>
                    <div class="flex justify-between text-[11px] text-slate-400 font-bold uppercase tracking-wider">
                        <span>Tax & Service (15%)</span>
                        <span id="checkTax" class="text-slate-600 font-black">IDR 0</span>
                    </div>
                    <div
                        class="flex justify-between items-center text-lg font-black text-slate-900 pt-3 border-t border-slate-200/60 mt-2">
                        <span class="serif italic">Grand Total</span>
                        <span id="checkTotal" class="text-blue-600">IDR 0</span>
                    </div>
                </div>
                <button onclick="prosesBayar()"
                    class="w-full bg-slate-900 hover:bg-blue-600 text-white py-4 rounded-xl font-bold text-sm shadow-xl transition-all flex items-center justify-center gap-3 active:scale-[0.98]">
                    Konfirmasi Pembayaran <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyCQuohmYq7Q_eR7OpfjrVgdRitOgqcX2GY",
        authDomain: "cafe-order-system-f7024.firebaseapp.com",
        projectId: "cafe-order-system-f7024",
        storageBucket: "cafe-order-system-f7024.firebasestorage.app",
        messagingSenderId: "903604964032",
        appId: "1:903604964032:web:ab5c8efd4acf36b4943b25",
        databaseURL: "https://cafe-order-system-f7024-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let mejaAktif = null;
    let cart = [];
    let currentCategory = 'Semua'; 

    const menuItems = [
        { id: 101, name: "Signature Blue Latte", price: 42000, category: "Coffee", desc: "Espresso with organic butterfly pea floral milk", image: "https://images.unsplash.com/photo-1541167760496-162955ed8a9f?w=600" },
        { id: 102, name: "Himalayan Pink Salt Coffee", price: 38000, category: "Coffee", desc: "Smooth cream with a hint of mountain minerals", image: "https://images.unsplash.com/photo-1517701550927-30cf4ba1dba5?w=600" },
        { id: 401, name: "Royal Earl Grey", price: 30000, category: "Tea", desc: "Premium black tea infused with bergamot orange", image: "https://images.unsplash.com/photo-1576092768241-dec231879fc3?w=600" }, // Item Tea Baru
        { id: 201, name: "Matcha Glazed Croissant", price: 35000, category: "Pastry", desc: "Flaky texture with premium Kyoto matcha glaze", image: "https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=600" },
        { id: 301, name: "Sparkling Lavender Lemonade", price: 32000, category: "Non-Coffee", desc: "Infused lavender flowers with fresh Sicilian lemon", image: "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=600" }
    ];

    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const mejaUrl = params.get('meja');
        if (mejaUrl) {
            mejaAktif = mejaUrl;
            document.getElementById('displayMeja').textContent = `Executive Table ${mejaUrl}`;
            document.getElementById('sidebarMejaInfo').textContent = `Executive Table ${mejaUrl}`;
        }
        renderMenu(); 
        lucide.createIcons();
    });

    function toggleSidebar(open) {
    const container = document.getElementById('sidebarContainer');
    const overlay = document.getElementById('sidebarOverlay');
    const sidebar = document.getElementById('mobileSidebar');
    const body = document.body; // Referensi ke elemen body

    if (open) {
        container.classList.remove('hidden');
        body.classList.add('no-scroll'); // Aktifkan scroll lock
        
        setTimeout(() => {
            overlay.classList.add('opacity-100');
            sidebar.classList.remove('-translate-x-full');
        }, 10);
    } else {
        overlay.classList.remove('opacity-100');
        sidebar.classList.add('-translate-x-full');
        body.classList.remove('no-scroll'); // Matikan scroll lock
        
        setTimeout(() => {
            container.classList.add('hidden');
        }, 400);
    }
}

    function renderMenu() {
        const grid = document.getElementById('menuGrid');
        let filterTarget = currentCategory;
        
        // Logika agar tombol 'Dining' mengambil kategori 'Non-Coffee' di database/array
        if(currentCategory === 'Dining') filterTarget = 'Non-Coffee';

        const filteredItems = filterTarget === 'Semua' 
            ? menuItems 
            : menuItems.filter(i => i.category === filterTarget);

        grid.innerHTML = filteredItems.map(item => {
            const cartItem = cart.find(c => c.id === item.id);
            const currentQty = cartItem ? cartItem.qty : 0;

            return `
            <div class="menu-card bg-white rounded-[2rem] overflow-hidden border border-slate-100 shadow-sm animate-fade">
                <div class="h-60 overflow-hidden relative group">
                    <img src="${item.image}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                    <div class="absolute top-4 right-4 bg-white/90 backdrop-blur-md px-3 py-1 rounded-full text-[9px] font-black tracking-widest uppercase text-blue-600">
                        ${item.category === 'Non-Coffee' ? 'Dining' : item.category}
                    </div>
                </div>
                <div class="p-6">
                    <h3 class="serif text-lg font-bold text-slate-900 mb-1">${item.name}</h3>
                    <p class="text-[11px] text-slate-400 font-medium mb-4 line-clamp-2">${item.desc}</p>
                    <div class="flex justify-between items-center">
                        <span class="text-base font-black text-slate-900">IDR ${item.price.toLocaleString()}</span>
                        <div class="flex items-center bg-slate-50 p-1 rounded-xl gap-2.5 border border-slate-100">
                            <button onclick="updateQty(${item.id}, -1)" class="w-7 h-7 flex items-center justify-center rounded-lg bg-white text-slate-400 hover:text-red-500 shadow-sm transition-colors active:scale-90"><i data-lucide="minus" class="w-3.5 h-3.5"></i></button>
                            <span id="qty-grid-${item.id}" class="text-xs font-bold w-3 text-center">${currentQty}</span>
                            <button onclick="updateQty(${item.id}, 1)" class="w-7 h-7 flex items-center justify-center rounded-lg bg-slate-900 text-white shadow-md active:scale-90 transition-transform"><i data-lucide="plus" class="w-3.5 h-3.5"></i></button>
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');
        lucide.createIcons();
    }

    function filterMenu(cat) {
        currentCategory = cat;
        document.querySelectorAll('.cat-btn').forEach(b => {
            b.classList.remove('active');
            b.classList.add('bg-slate-50', 'text-slate-500');
        });
        event.currentTarget.classList.add('active');
        event.currentTarget.classList.remove('bg-slate-50', 'text-slate-500');
        renderMenu();
    }

    function updateQty(id, change) {
        const item = menuItems.find(i => i.id === id);
        let cartItem = cart.find(i => i.id === id);
        
        if (cartItem) {
            cartItem.qty += change;
            if (cartItem.qty <= 0) {
                cart = cart.filter(i => i.id !== id);
                cartItem.qty = 0;
            }
        } else if (change > 0) {
            cartItem = { ...item, qty: 1 };
            cart.push(cartItem);
        }
        
        document.getElementById('cartCount').textContent = cart.reduce((a, b) => a + b.qty, 0);
        
        const qtyDisplay = document.getElementById(`qty-grid-${id}`);
        if (qtyDisplay) {
            qtyDisplay.textContent = cartItem ? cartItem.qty : 0;
        }
        
        if(!document.getElementById('checkoutModal').classList.contains('hidden')) {
            if (cart.length === 0) {
                closeCheckout();
            } else {
                openCheckout();
            }
        }
    }

    function removeItem(id) {
        cart = cart.filter(i => i.id !== id);
        document.getElementById('cartCount').textContent = cart.reduce((a, b) => a + b.qty, 0);
        
        const qtyDisplay = document.getElementById(`qty-grid-${id}`);
        if (qtyDisplay) qtyDisplay.textContent = 0;

        if (cart.length === 0) closeCheckout(); else openCheckout();
    }

    function openCheckout() {
        if (cart.length === 0) return;
        document.getElementById('checkoutModal').classList.remove('hidden');
        
        const subtotal = cart.reduce((acc, curr) => acc + (curr.price * curr.qty), 0);
        const serviceTax = Math.round(subtotal * 0.15);
        const total = subtotal + serviceTax;
        
        document.getElementById('checkSub').textContent = `IDR ${subtotal.toLocaleString()}`;
        document.getElementById('checkTax').textContent = `IDR ${serviceTax.toLocaleString()}`;
        document.getElementById('checkTotal').textContent = `IDR ${total.toLocaleString()}`;
        
        document.getElementById('checkoutItems').innerHTML = cart.map(i => `
            <div class="flex gap-4 items-center bg-white p-4 rounded-2xl border border-slate-100 shadow-sm animate-fade">
                <img src="${i.image}" class="w-16 h-16 rounded-xl object-cover shadow-sm">
                <div class="flex-1">
                    <h4 class="text-[14px] font-bold text-slate-800 mb-0.5">${i.name}</h4>
                    <p class="text-[11px] text-blue-600 font-bold">IDR ${i.price.toLocaleString()}</p>
                </div>
                <div class="flex items-center gap-3">
                    <div class="flex items-center bg-slate-100 p-1 rounded-xl gap-2 border border-slate-200">
                        <button onclick="updateQty(${i.id}, -1)" class="w-7 h-7 flex items-center justify-center rounded-lg bg-white text-slate-400 hover:text-red-500 shadow-sm transition-all active:scale-90">
                            <i data-lucide="minus" class="w-3.5 h-3.5"></i>
                        </button>
                        <span class="text-xs font-bold w-4 text-center text-slate-900">${i.qty}</span>
                        <button onclick="updateQty(${i.id}, 1)" class="w-7 h-7 flex items-center justify-center rounded-lg bg-slate-900 text-white shadow-sm transition-all active:scale-90">
                            <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                    <button onclick="removeItem(${i.id})" class="w-9 h-9 flex items-center justify-center rounded-xl bg-red-50 text-red-500 hover:bg-red-500 hover:text-white transition-all duration-300">
                        <i data-lucide="trash-2" class="w-4.5 h-4.5"></i>
                    </button>
                </div>
            </div>
        `).join('');
        lucide.createIcons();
    }

    function closeCheckout() { document.getElementById('checkoutModal').classList.add('hidden'); }

    async function prosesBayar() {
        const name = document.getElementById('customerName').value.trim();
        if (!name) return alert("Mohon masukkan nama Anda.");
        if (!mejaAktif) return alert("Nomor meja tidak ditemukan.");
        
        const subtotal = cart.reduce((acc, curr) => acc + (curr.price * curr.qty), 0);
        const total = Math.round(subtotal * 1.15);
        
        try {
            await db.ref('tables/' + mejaAktif).update({
                status: 'occupied',
                orderDetail: { items: cart, total: total, customerName: name, time: new Date().toLocaleTimeString('id-ID') }
            });
            const res = await fetch("/.netlify/functions/createTransaction", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ items: cart, total: total, customerName: name })
            });
            const data = await res.json();
            if (data.token) snap.pay(data.token, { onSuccess: () => location.reload() });
        } catch (err) { alert("Error memproses pembayaran."); }
    }
</script>

</body>

</html>
